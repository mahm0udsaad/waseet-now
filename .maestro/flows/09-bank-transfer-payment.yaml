appId: com.mahm09d.kafel

---

# Flow 09: Make a bank transfer payment (buyer)
# Requires: Receipt accepted, payment link available in chat

- runFlow: ../helpers/login-buyer.yaml

# Navigate to chats tab
- tapOn:
    id: "tab-chats"
- waitForAnimationToEnd

# Open the chat with seller
- tapOn:
    index: 0
- waitForAnimationToEnd

# Tap "Pay Now" button on the payment link card
- tapOn:
    id: "payment-pay-btn"
- waitForAnimationToEnd

# Select bank transfer payment method
- tapOn:
    id: "payment-bank-transfer"
- waitForAnimationToEnd

# Enter phone number for transfer reference
- tapOn:
    id: "payment-phone-input"
- inputText: ${BUYER_PHONE}

# Submit payment
- tapOn:
    id: "payment-submit-btn"
- waitForAnimationToEnd
